<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园跳蚤市场</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; padding-top: 70px; }

        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: #fff; padding: 15px 50px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo { display: flex; align-items: center; gap: 10px; color: #0a8c7f; font-size: 20px; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #555; text-decoration: none; margin-left: 25px; font-size: 15px; transition: 0.3s; }
        .nav-links a:hover { color: #0a8c7f; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .user-card {
            background: #fff; border-radius: 12px; padding: 30px;
            display: flex; align-items: center; gap: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 25px;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #0a8c7f 0%, #a8e6cf 100%);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 32px; font-weight: bold;
        }
        .user-info h2 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .user-info p { color: #888; font-size: 14px; margin-bottom: 4px; }
        .user-info .tag {
            display: inline-block; background: #0a8c7f; color: #fff;
            padding: 3px 12px; border-radius: 12px; font-size: 12px; margin-top: 8px;
        }

        .section {
            background: #fff; border-radius: 12px; padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 25px;
        }
        .section h3 {
            font-size: 18px; color: #333; margin-bottom: 20px;
            padding-left: 12px; border-left: 4px solid #0a8c7f;
        }

        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
        }
        .product-card {
            border: 1px solid #eee; border-radius: 10px; overflow: hidden;
            transition: all 0.3s;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; background: #f5f5f5; }
        .product-card .info { padding: 15px; }
        .product-card h4 { font-size: 15px; color: #333; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-card .price { color: #e74c3c; font-weight: bold; font-size: 16px; }
        .product-card .status {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 12px; margin-top: 8px;
        }
        .status-1 { background: #e8f5e9; color: #2e7d32; }
        .status-2 { background: #fff3e0; color: #ef6c00; }
        .status-3 { background: #fce4ec; color: #c62828; }

        .empty {
            text-align: center; padding: 60px 20px; color: #999;
        }
        .empty::before {
            content: "📭"; display: block; font-size: 48px; margin-bottom: 15px; opacity: 0.4;
        }

        .btn-edit {
            background: #0a8c7f; color: #fff; border: none; padding: 8px 20px;
            border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .btn-edit:hover { background: #097a6e; }

        .stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;
        }
        .stat-card {
            background: #fff; border-radius: 12px; padding: 20px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #0a8c7f; }
        .stat-card .label { color: #888; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <a th:href="@{/index}" class="logo">🏪 校园跳蚤市场</a>
    <div class="nav-links">
        <a th:href="@{/index}">首页</a>
        <a href="#">我的收藏</a>
        <a th:href="@{/user/center}">个人中心</a>
        <a th:href="@{/logout}">退出登录</a>
    </div>
</header>

<div class="container">

    <!-- 用户卡片 -->
    <div class="user-card">
        <div class="avatar" th:text="${#strings.substring(user.nickname,0,1)}">用</div>
        <div class="user-info">
            <h2 th:text="${user.nickname}">用户昵称</h2>
            <p>用户名：<span th:text="${user.username}">username</span></p>
            <p>手机号：<span th:text="${user.phone != null ? user.phone : '未绑定'}">13800138000</span></p>
            <span class="tag">普通用户</span>
        </div>
        <button class="btn-edit" onclick="alert('编辑功能开发中')">编辑资料</button>
    </div>

    <!-- 统计 -->
    <div class="stats">
        <div class="stat-card">
            <div class="num" th:text="${myProducts.size()}">0</div>
            <div class="label">我的发布</div>
        </div>
        <div class="stat-card">
            <div class="num" id="favCount">0</div>
            <div class="label">我的收藏</div>
        </div>
        <div class="stat-card">
            <div class="num">0</div>
            <div class="label">交易订单</div>
        </div>
    </div>

    <!-- 我的发布 -->
    <div class="section">
        <h3>我的发布</h3>
        <div class="product-grid" th:if="${!#lists.isEmpty(myProducts)}">
            <div class="product-card" th:each="p : ${myProducts}">
                <img th:src="@{'/static/images/' + ${p.image}}" alt="商品图片" onerror="this.style.display='none'">
                <div class="info">
                    <h4 th:text="${p.title}">商品名称</h4>
                    <div class="price">¥<span th:text="${p.price}">99</span></div>
                    <span class="status" th:classappend="${p.status == 1} ? 'status-1' : (${p.status == 2} ? 'status-2' : 'status-3')"
                          th:text="${p.status == 1} ? '上架中' : (${p.status == 2} ? '已下架' : '已售出')">上架中</span>
                </div>
            </div>
        </div>
        <div class="empty" th:if="${#lists.isEmpty(myProducts)}">
            <p>还没有发布过商品</p>
            <p style="font-size: 13px; margin-top: 10px;">去首页发布你的第一个商品吧</p>
        </div>
    </div>

    <!-- 我的收藏（从localStorage读取） -->
    <div class="section">
        <h3>我的收藏</h3>
        <div class="product-grid" id="favoritesGrid">
            <!-- JS动态渲染 -->
        </div>
        <div class="empty" id="emptyFavorites" style="display:none;">
            <p>暂无收藏商品</p>
        </div>
    </div>

</div>

<script>
    // 读取本地收藏并渲染
    (function() {
        const favs = JSON.parse(localStorage.getItem('campus_favorites') || '[]');
        document.getElementById('favCount').textContent = favs.length;

        const grid = document.getElementById('favoritesGrid');
        const empty = document.getElementById('emptyFavorites');

        if (favs.length === 0) {
            grid.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        grid.innerHTML = favs.map(f => `
            <div class="product-card">
                <img src="${f.img}" alt="${f.name}" onerror="this.style.display='none'" style="width:100%;height:150px;object-fit:cover;">
                <div class="info">
                    <h4>${f.name}</h4>
                    <div class="price">¥${f.price}</div>
                </div>
            </div>
        `).join('');
    })();
</script>

</body>
</html>
