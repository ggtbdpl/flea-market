<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑商品 - 校园跳蚤市场</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .edit-wrapper { display: flex; gap: 30px; flex-wrap: wrap; }
        .image-section { flex: 1; min-width: 280px; max-width: 380px; }
        .image-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center; }
        .image-preview { width: 100%; height: 280px; object-fit: cover; border-radius: 8px; background: #f5f7fa; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; border: 2px dashed #e0e0e0; overflow: hidden; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .upload-area { border: 2px dashed #0a8c7f; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.3s; color: #0a8c7f; font-size: 14px; display: block; }
        .upload-area:hover { background: rgba(10,140,127,0.04); }
        .upload-area input { display: none; }
        .form-section { flex: 2; min-width: 320px; }
        .form-card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; margin-bottom: 20px; }
        .form-row .form-group { margin-bottom: 0; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; font-size: 14px; }
        .form-group label .required { color: #e74c3c; margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: all 0.3s; background: #fafbfc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #0a8c7f; background: #fff; box-shadow: 0 0 0 3px rgba(10,140,127,0.08); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .price-input { display: flex; align-items: center; }
        .price-input span { background: #f5f5f5; padding: 10px 14px; border: 1px solid #e0e0e0; border-right: none; border-radius: 8px 0 0 8px; color: #666; font-size: 14px; }
        .price-input input { border-radius: 0 8px 8px 0; }
        .form-actions { display: flex; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        .btn-primary { padding: 12px 32px; background: #0a8c7f; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
        .btn-primary:hover { background: #097a6e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10,140,127,0.25); }
        .btn-secondary { padding: 12px 32px; background: #f5f5f5; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; text-decoration: none; transition: all 0.3s; display: inline-flex; align-items: center; }
        .btn-secondary:hover { background: #e8e8e8; }
        .tips { margin-top: 8px; font-size: 12px; color: #999; }

        /* 弹窗样式内联 */
        .toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .toast { background: #0a8c7f; color: #fff; padding: 14px 28px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 16px rgba(10,140,127,0.3); margin-bottom: 10px; opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; pointer-events: auto; display: flex; align-items: center; gap: 8px; min-width: 200px; justify-content: center; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #e74c3c; box-shadow: 0 4px 16px rgba(231,76,60,0.3); }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}" class="active">商品管理</a></li>
                <li><a th:href="@{/admin/category}">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a th:href="@{/admin/announcement}">公告管理</a></li>
                <li><a th:href="@{/admin/message}">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a th:href="@{/logout}">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span th:text="'欢迎，' + ${admin.username}">欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header"><h2>编辑商品</h2></div>
            <div class="edit-wrapper">
                <div class="image-section">
                    <div class="image-card">
                        <h3 style="margin:0 0 20px;font-size:16px;color:#333;">商品图片</h3>
                        <div class="image-preview" id="previewBox">
                            <img th:if="${product.image != null and product.image != ''}" th:src="@{'/static/images/' + ${product.image}}" id="previewImg" onerror="this.style.display='none';this.parentElement.textContent='暂无图片';">
                            <span th:if="${product.image == null or product.image == ''}">暂无图片</span>
                        </div>
                        <label class="upload-area">
                            <input type="file" name="img" id="imgInput" accept="image/*" form="editForm">
                            <span>📷 点击更换图片</span>
                        </label>
                        <p class="tips">支持 JPG、PNG 格式，不上传则保留原图</p>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-card">
                        <form id="editForm" th:action="@{/Mupdate}" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="pid" th:value="${product.id}">
                            <div class="form-group">
                                <label>商品名称 <span class="required">*</span></label>
                                <input type="text" name="pname" th:value="${product.title}" placeholder="请输入商品名称" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>所属分类 <span class="required">*</span></label>
                                    <select name="categoryId" required>
                                        <option value="">选择分类</option>
                                        <option th:each="c : ${categoryList}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id == product.categoryId}">分类</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>商品状态</label>
                                    <select name="status">
                                        <option value="0" th:selected="${product.status == 0}">待审核</option>
                                        <option value="1" th:selected="${product.status == 1}">上架</option>
                                        <option value="2" th:selected="${product.status == 2}">下架</option>
                                        <option value="3" th:selected="${product.status == 3}">已售出</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>现价 <span class="required">*</span></label>
                                    <div class="price-input"><span>¥</span><input type="number" name="price" step="0.01" th:value="${product.price}" placeholder="0.00" required></div>
                                </div>
                                <div class="form-group">
                                    <label>原价</label>
                                    <div class="price-input"><span>¥</span><input type="number" name="originalPrice" step="0.01" th:value="${product.originalPrice}" placeholder="0.00"></div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>成色</label>
                                    <input type="text" name="stock" th:value="${product.condition}" placeholder="如：9成新、95新">
                                </div>
                                <div class="form-group">
                                    <label>联系方式 <span class="required">*</span></label>
                                    <input type="text" name="contact" th:value="${product.contact}" placeholder="微信/QQ/手机号" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>商品描述</label>
                                <textarea name="description" th:text="${product.description}" placeholder="请输入商品描述..."></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary" id="saveBtn">💾 保存修改</button>
                                <a th:href="@{/admin/product}" class="btn-secondary">← 返回列表</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
    function showToast(msg, type) {
        type = type || 'success';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
        container.appendChild(toast);
        setTimeout(function() { toast.classList.add('show'); }, 10);
        setTimeout(function() {
            toast.classList.remove('show');
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }

    document.getElementById('imgInput').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = document.getElementById('previewImg');
                var box = document.getElementById('previewBox');
                if (!img) {
                    img = document.createElement('img');
                    img.id = 'previewImg';
                    box.innerHTML = '';
                    box.appendChild(img);
                }
                img.src = e.target.result;
                img.style.display = 'block';
                img.onerror = function() { this.style.display = 'none'; box.textContent = '暂无图片'; };
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('editForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = '保存中...';
        showToast('修改成功！', 'success');
        var form = this;
        setTimeout(function() { form.submit(); }, 800);
    });
</script>
</body>
</html>
