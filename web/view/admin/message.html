<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>留言管理</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .data-table {
            table-layout: fixed;
            width: 100%;
        }
        .data-table th,
        .data-table td {
            padding: 12px 10px;
            vertical-align: middle;
            text-align: center;
        }
        .content-cell {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
            padding-left: 20px;
        }
        .action-btns {
            white-space: nowrap;
        }
        .action-btns a {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            text-decoration: none;
            margin: 0 3px;
            border: 1px solid;
            transition: all 0.2s;
        }
        .action-btns a:hover {
            opacity: 0.8;
        }
        .btn-view {
            color: #2980b9;
            border-color: #3498db;
            background: #f8fbfd;
        }
        .btn-view:hover {
            background: #eaf2f8;
        }
        .delete {
            color: #c0392b;
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        .delete:hover {
            background: #f8e5e5;
        }

        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            background: #0a8c7f;
            color: #fff;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(10,140,127,0.3);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 200px;
            justify-content: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error {
            background: #e74c3c;
            box-shadow: 0 4px 16px rgba(231,76,60,0.3);
        }
        .custom-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 9998;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .custom-confirm-overlay.active {
            display: flex;
            opacity: 1;
        }
        .custom-confirm-box {
            background: #fff;
            border-radius: 12px;
            padding: 28px 32px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }
        .custom-confirm-overlay.active .custom-confirm-box {
            transform: scale(1);
        }
        .confirm-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .confirm-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .confirm-msg {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .confirm-actions button {
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #555;
        }
        .btn-cancel:hover {
            background: #e8e8e8;
        }
        .btn-confirm {
            background: #0a8c7f;
            color: #fff;
        }
        .btn-confirm:hover {
            background: #097a6e;
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}">商品管理</a></li>
                <li><a th:href="@{/admin/category}">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a th:href="@{/admin/announcement}">公告管理</a></li>
                <li><a th:href="@{/admin/message}" class="active">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a th:href="@{/logout}">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span>欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header">
                <h2>留言管理</h2>
            </div>

            <table class="data-table">
                <thead>
                <tr>
                    <th style="width: 8%;">ID</th>
                    <th style="width: 12%;">商品</th>
                    <th style="width: 12%;">留言用户</th>
                    <th style="width: 35%;">内容</th>
                    <th style="width: 18%;">时间</th>
                    <th style="width: 15%;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="msg : ${messageList}">
                    <td th:text="${msg.id}">1</td>
                    <td th:text="${msg.productId}">1</td>
                    <td th:text="${msg.fromUserId}">2</td>
                    <td class="content-cell" th:text="${msg.content}" th:title="${msg.content}">留言内容</td>
                    <td th:text="${msg.createTime}">2024-01-01</td>
                    <td class="action-btns">
                        <a th:href="@{/admin/message/detail(productId=${msg.productId})}" class="btn-view">查看详情</a>
                        <a href="javascript:void(0)" class="delete" th:attr="data-url=@{/admin/message(action='delete', messageId=${msg.id})}" onclick="handleDelete(this, '确定删除该留言？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(messageList)}">
                    <td colspan="6" style="text-align:center;padding:40px;color:#999;">暂无留言数据</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="toastContainer" class="toast-container"></div>

<div id="confirmOverlay" class="custom-confirm-overlay">
    <div class="custom-confirm-box">
        <div class="confirm-icon">⚠️</div>
        <div class="confirm-title">确认删除</div>
        <div class="confirm-msg" id="confirmMsg">确定要执行此操作吗？</div>
        <div class="confirm-actions">
            <button class="btn-cancel" onclick="closeConfirm()">取消</button>
            <button class="btn-confirm" id="confirmBtn">确定</button>
        </div>
    </div>
</div>

<script>
    function showToast(msg, type) {
        type = type || 'success';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
        container.appendChild(toast);
        setTimeout(function() { toast.classList.add('show'); }, 10);
        setTimeout(function() {
            toast.classList.remove('show');
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }

    var confirmCallback = null;
    function showConfirm(msg, callback) {
        confirmCallback = callback;
        document.getElementById('confirmMsg').textContent = msg;
        document.getElementById('confirmOverlay').classList.add('active');
    }
    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('active');
        confirmCallback = null;
    }
    document.getElementById('confirmBtn').addEventListener('click', function() {
        if (confirmCallback) confirmCallback();
        closeConfirm();
    });
    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeConfirm();
    });

    function handleDelete(el, msg) {
        showConfirm(msg, function() {
            showToast('删除成功！', 'success');
            setTimeout(function() {
                window.location.href = el.getAttribute('data-url');
            }, 600);
        });
    }
</script>
</body>
</html>
