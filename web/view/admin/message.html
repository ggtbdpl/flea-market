<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>留言管理</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .data-table {
            table-layout: fixed;
            width: 100%;
        }
        .data-table th,
        .data-table td {
            padding: 12px 10px;
            vertical-align: middle;
            text-align: center;
        }

        .content-cell {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
            padding-left: 20px;
        }

        .action-btns {
            white-space: nowrap;
        }
        .action-btns a {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            text-decoration: none;
            margin: 0 3px;
            border: 1px solid;
            transition: all 0.2s;
        }
        .action-btns a:hover {
            opacity: 0.8;
        }

        .btn-view {
            color: #2980b9;
            border-color: #3498db;
            background: #f8fbfd;
        }
        .btn-view:hover {
            background: #eaf2f8;
        }

        .delete {
            color: #c0392b;
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        .delete:hover {
            background: #f8e5e5;
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}">商品管理</a></li>
                <li><a th:href="@{/admin/category}">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a th:href="@{/admin/announcement}">公告管理</a></li>
                <li><a th:href="@{/admin/message}" class="active">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a th:href="@{/logout}">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span>欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header">
                <h2>留言管理</h2>
            </div>

            <table class="data-table">
                <thead>
                <tr>
                    <th style="width: 8%;">ID</th>
                    <th style="width: 12%;">商品</th>
                    <th style="width: 12%;">留言用户</th>
                    <th style="width: 35%;">内容</th>
                    <th style="width: 18%;">时间</th>
                    <th style="width: 15%;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="msg : ${messageList}">
                    <td th:text="${msg.id}">1</td>
                    <td th:text="${msg.productId}">1</td>
                    <td th:text="${msg.fromUserId}">2</td>
                    <td class="content-cell" th:text="${msg.content}" th:title="${msg.content}">留言内容</td>
                    <td th:text="${msg.createTime}">2024-01-01</td>
                    <td class="action-btns">
                        <a th:href="@{/admin/message/detail(productId=${msg.productId})}" class="btn-view">查看详情</a>
                        <a th:href="@{/admin/message(action='delete', messageId=${msg.id})}" class="delete" onclick="return confirm('确定删除？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(messageList)}">
                    <td colspan="6" style="text-align:center;padding:40px;color:#999;">暂无留言数据</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
