<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分类管理</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 24px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { font-size: 24px; color: #999; cursor: pointer; background: none; border: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .data-table { table-layout: fixed; width: 100%; }
        .data-table th, .data-table td { padding: 12px 10px; vertical-align: middle; text-align: center; }
        .status-1 { color: #27ae60; }
        .status-2 { color: #c0392b; }
        .action-btns { white-space: nowrap; }
        .action-btns a { text-decoration: none; margin: 0 4px; }
        .edit-link { color: #2980b9; }
        .delete { color: #c0392b; }

        /* 弹窗样式内联 */
        .toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .toast { background: #0a8c7f; color: #fff; padding: 14px 28px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 16px rgba(10,140,127,0.3); margin-bottom: 10px; opacity: 0; transform: translateY(-20px); transition: all 0.3s ease; pointer-events: auto; display: flex; align-items: center; gap: 8px; min-width: 200px; justify-content: center; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #e74c3c; box-shadow: 0 4px 16px rgba(231,76,60,0.3); }

        .custom-confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s ease; }
        .custom-confirm-overlay.active { display: flex; opacity: 1; }
        .custom-confirm-box { background: #fff; border-radius: 12px; padding: 28px 32px; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); text-align: center; transform: scale(0.9); transition: transform 0.2s ease; }
        .custom-confirm-overlay.active .custom-confirm-box { transform: scale(1); }
        .confirm-icon { font-size: 48px; margin-bottom: 12px; }
        .confirm-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .confirm-msg { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6; }
        .confirm-actions { display: flex; gap: 12px; justify-content: center; }
        .confirm-actions button { padding: 10px 24px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-cancel { background: #f5f5f5; color: #555; }
        .btn-cancel:hover { background: #e8e8e8; }
        .btn-confirm { background: #0a8c7f; color: #fff; }
        .btn-confirm:hover { background: #097a6e; }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}">商品管理</a></li>
                <li><a th:href="@{/admin/category}" class="active">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a th:href="@{/admin/announcement}">公告管理</a></li>
                <li><a th:href="@{/admin/message}">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a href="#">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span th:text="'欢迎，' + ${admin.username}">欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header">
                <h2>分类管理</h2>
                <button class="btn-primary" onclick="openAddModal()">+ 新增分类</button>
            </div>
            <table class="data-table">
                <thead><tr><th style="width:8%;">ID</th><th style="width:15%;">名称</th><th style="width:30%;">描述</th><th style="width:15%;">图标</th><th style="width:10%;">排序</th><th style="width:10%;">状态</th><th style="width:12%;">操作</th></tr></thead>
                <tbody>
                <tr th:each="c : ${categoryList}">
                    <td th:text="${c.id}">1</td>
                    <td th:text="${c.name}">教材书籍</td>
                    <td th:text="${c.description}">课本、复习资料</td>
                    <td th:text="${c.icon}">icon-xxx</td>
                    <td th:text="${c.sortOrder}">1</td>
                    <td><span th:if="${c.status == 1}" class="status-1">启用</span><span th:if="${c.status != 1}" class="status-2">禁用</span></td>
                    <td class="action-btns">
                        <a href="javascript:void(0)" th:attr="data-id=${c.id}, data-name=${c.name}, data-desc=${c.description}, data-icon=${c.icon}, data-sort=${c.sortOrder}, data-status=${c.status}" class="edit-link">编辑</a>
                        <a href="javascript:void(0)" class="delete" th:attr="data-url=@{/admin/category/del(id=${c.id})}" onclick="handleDelete(this, '确定删除该分类？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categoryList)}"><td colspan="7" style="text-align:center;padding:40px;color:#999;">暂无分类数据</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>新增分类</h3><button class="modal-close" onclick="closeModal('addModal')">&times;</button></div>
        <form th:action="@{/admin/category/add}" method="post" id="addForm">
            <div class="form-group"><label>分类名称</label><input type="text" name="name" required></div>
            <div class="form-group"><label>描述</label><input type="text" name="description" required></div>
            <div class="form-group"><label>图标类名</label><input type="text" name="icon" placeholder="如：iconfont icon-xxx"></div>
            <div class="form-group"><label>排序</label><input type="number" name="sortOrder" value="1"></div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>编辑分类</h3><button class="modal-close" onclick="closeModal('editModal')">&times;</button></div>
        <form th:action="@{/admin/category/update}" method="post" id="editForm">
            <input type="hidden" name="id" id="editId">
            <div class="form-group"><label>分类名称</label><input type="text" name="name" id="editName" required></div>
            <div class="form-group"><label>描述</label><input type="text" name="description" id="editDesc" required></div>
            <div class="form-group"><label>图标类名</label><input type="text" name="icon" id="editIcon"></div>
            <div class="form-group"><label>排序</label><input type="number" name="sortOrder" id="editSort"></div>
            <div class="form-group"><label>状态</label><select name="status" id="editStatus"><option value="1">启用</option><option value="0">禁用</option></select></div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('editModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<div id="confirmOverlay" class="custom-confirm-overlay">
    <div class="custom-confirm-box">
        <div class="confirm-icon">⚠️</div>
        <div class="confirm-title">确认删除</div>
        <div class="confirm-msg" id="confirmMsg">确定要执行此操作吗？</div>
        <div class="confirm-actions">
            <button class="btn-cancel" onclick="closeConfirm()">取消</button>
            <button class="btn-confirm" id="confirmBtn">确定</button>
        </div>
    </div>
</div>

<script>
    function showToast(msg, type) {
        type = type || 'success';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
        container.appendChild(toast);
        setTimeout(function() { toast.classList.add('show'); }, 10);
        setTimeout(function() {
            toast.classList.remove('show');
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }

    var confirmCallback = null;
    function showConfirm(msg, callback) {
        confirmCallback = callback;
        document.getElementById('confirmMsg').textContent = msg;
        document.getElementById('confirmOverlay').classList.add('active');
    }
    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('active');
        confirmCallback = null;
    }
    document.getElementById('confirmBtn').addEventListener('click', function() {
        if (confirmCallback) confirmCallback();
        closeConfirm();
    });
    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeConfirm();
    });

    function handleDelete(el, msg) {
        showConfirm(msg, function() {
            showToast('删除成功！', 'success');
            setTimeout(function() {
                window.location.href = el.getAttribute('data-url');
            }, 600);
        });
    }

    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.querySelectorAll('.modal').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
    });
    document.querySelectorAll('.edit-link').forEach(function(link) {
        link.addEventListener('click', function() {
            document.getElementById('editId').value = this.getAttribute('data-id');
            document.getElementById('editName').value = this.getAttribute('data-name');
            document.getElementById('editDesc').value = this.getAttribute('data-desc');
            document.getElementById('editIcon').value = this.getAttribute('data-icon');
            document.getElementById('editSort').value = this.getAttribute('data-sort');
            document.getElementById('editStatus').value = this.getAttribute('data-status');
            document.getElementById('editModal').classList.add('active');
        });
    });

    document.getElementById('addForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showToast('保存成功！', 'success');
        var form = this;
        setTimeout(function() { form.submit(); }, 600);
    });

    document.getElementById('editForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showToast('保存成功！', 'success');
        var form = this;
        setTimeout(function() { form.submit(); }, 600);
    });
</script>
</body>
</html>
