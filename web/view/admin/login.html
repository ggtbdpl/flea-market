<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>后台登录 - 校园跳蚤市场</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-box {
            width: 400px;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h2 {
            color: #1abc9c;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #999;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1abc9c;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1abc9c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #16a085;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-header">
        <h2>校园跳蚤市场</h2>
        <p>后台管理系统</p>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>

        <div class="error-msg" th:if="${error}" th:text="${error}" th:classappend="show"></div>

        <button type="submit" class="btn-login">登录</button>
    </form>
</div>
</body>
</html>
