<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告管理</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 24px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { font-size: 24px; color: #999; cursor: pointer; background: none; border: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .content-preview { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}">商品管理</a></li>
                <li><a th:href="@{/admin/category}">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a href="#" class="active">公告管理</a></li>
                <li><a th:href="@{/admin/message}">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a th:href="@{/logout}">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span th:text="'欢迎，' + ${admin.username}">欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header">
                <h2>公告管理</h2>
                <button class="btn-primary" onclick="openAddModal()">+ 新增公告</button>
            </div>

            <table class="data-table">
                <thead>
                <tr><th>ID</th><th>标题</th><th>内容</th><th>类型</th><th>状态</th><th>发布时间</th><th>操作</th></tr>
                </thead>
                <tbody>
                <tr th:each="a : ${announcementList}">
                    <td th:text="${a.id}">1</td>
                    <td th:text="${a.title}">标题</td>
                    <td class="content-preview" th:text="${a.content}">内容预览</td>
                    <td>
                        <span th:if="${a.type == 'normal'}">普通</span>
                        <span th:if="${a.type == 'important'}">重要</span>
                        <span th:if="${a.type == 'activity'}">活动</span>
                    </td>
                    <td>
                        <span th:if="${a.status == 1}" class="status-1">启用</span>
                        <span th:if="${a.status != 1}" class="status-2">禁用</span>
                    </td>
                    <td th:text="${a.createTime}">2024-01-01</td>
                    <td class="action-btns">
                        <a href="javascript:void(0)" th:attr="data-id=${a.id}, data-title=${a.title}, data-content=${a.content}, data-type=${a.type}, data-status=${a.status}" class="edit-link">编辑</a>
                        <a th:href="@{/admin/announcement(action=del, id=${a.id})}" class="delete" onclick="return confirm('确定删除该公告？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(announcementList)}">
                    <td colspan="7" style="text-align:center;padding:40px;color:#999;">暂无公告</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- 新增公告弹窗 -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>新增公告</h3><button class="modal-close" onclick="closeModal('addModal')">&times;</button></div>
        <form th:action="@{/admin/announcement}" method="post">
            <input type="hidden" name="action" value="add">
            <div class="form-group"><label>标题</label><input type="text" name="title" required maxlength="200"></div>
            <div class="form-group"><label>内容</label><textarea name="content" required></textarea></div>
            <div class="form-group"><label>类型</label>
                <select name="type">
                    <option value="normal">普通</option>
                    <option value="important">重要</option>
                    <option value="activity">活动</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑公告弹窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>编辑公告</h3><button class="modal-close" onclick="closeModal('editModal')">&times;</button></div>
        <form th:action="@{/admin/announcement}" method="post">
            <input type="hidden" name="action" value="update">
            <input type="hidden" name="id" id="editId">
            <div class="form-group"><label>标题</label><input type="text" name="title" id="editTitle" required maxlength="200"></div>
            <div class="form-group"><label>内容</label><textarea name="content" id="editContent" required></textarea></div>
            <div class="form-group"><label>类型</label>
                <select name="type" id="editType">
                    <option value="normal">普通</option>
                    <option value="important">重要</option>
                    <option value="activity">活动</option>
                </select>
            </div>
            <div class="form-group"><label>状态</label>
                <select name="status" id="editStatus">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('editModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.querySelectorAll('.modal').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
    });
    document.querySelectorAll('.edit-link').forEach(function(link) {
        link.addEventListener('click', function() {
            document.getElementById('editId').value = this.getAttribute('data-id');
            document.getElementById('editTitle').value = this.getAttribute('data-title');
            document.getElementById('editContent').value = this.getAttribute('data-content');
            document.getElementById('editType').value = this.getAttribute('data-type');
            document.getElementById('editStatus').value = this.getAttribute('data-status');
            document.getElementById('editModal').classList.add('active');
        });
    });
</script>
</body>
</html>
