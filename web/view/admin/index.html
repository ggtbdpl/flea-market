<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        :root {
            --primary:    #1a1a2e;
            --accent:     #16213e;
            --highlight:  #0f3460;
            --danger:     #e94560;
            --success:    #00c853;
            --warning:    #f9a825;
            --bg:         #f5f7fa;
            --surface:    #ffffff;
            --text:       #2c3e50;
            --muted:      #95a5a6;
            --border:     #eef0f2;
            --shadow:     0 8px 32px rgba(26, 26, 46, 0.08);
            --shadow-lg:  0 20px 60px rgba(26, 26, 46, 0.12);
            --radius:     16px;
            --radius-sm:  10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .container h2 {
            padding: 28px 32px;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            background: linear-gradient(135deg, var(--surface) 0%, #fafbfc 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .container h2::before {
            content: "📋";
            font-size: 24px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 15px;
        }

        tr:first-child {
            background: linear-gradient(135deg, var(--highlight) 0%, var(--accent) 100%);
        }

        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            color: #fff;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        th:first-child { padding-left: 32px; }
        th:last-child { padding-right: 32px; }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            transition: background 0.2s ease;
        }

        tr:hover td {
            background: rgba(15, 52, 96, 0.02);
        }

        tr:last-child td { border-bottom: none; }
        tr:last-child td:first-child { border-radius: 0 0 0 var(--radius); }
        tr:last-child td:last-child { border-radius: 0 0 var(--radius) 0; }

        td:first-child {
            padding-left: 32px;
            font-weight: 600;
            color: var(--primary);
        }

        td:last-child { padding-right: 32px; }

        .单价 {
            font-weight: 700;
            color: var(--danger);
            font-size: 16px;
        }

        .单价::after {
            content: " 元";
            font-size: 13px;
            font-weight: 400;
            color: var(--muted);
        }

        .库存 {
            font-weight: 600;
            color: var(--success);
        }

        .库存.low { color: var(--danger); }

        a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        td:nth-child(4) a {
            background: rgba(233, 69, 96, 0.08);
            color: var(--danger);
            border: 1px solid rgba(233, 69, 96, 0.15);
        }

        td:nth-child(4) a::before {
            content: "🗑";
            font-size: 13px;
        }

        td:nth-child(4) a:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.25);
        }

        td:nth-child(5) a {
            background: rgba(15, 52, 96, 0.06);
            color: var(--highlight);
            border: 1px solid rgba(15, 52, 96, 0.12);
        }

        td:nth-child(5) a::before {
            content: "👁";
            font-size: 13px;
        }

        td:nth-child(5) a:hover {
            background: var(--highlight);
            color: #fff;
            border-color: var(--highlight);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 52, 96, 0.25);
        }

        .empty-row td {
            text-align: center;
            padding: 80px 32px;
            color: var(--muted);
            font-size: 16px;
        }

        .empty-row td::before {
            content: "📭";
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            body { padding: 16px 12px; }
            .container h2 { padding: 20px 20px; font-size: 18px; }
            table { font-size: 14px; }
            th, td { padding: 14px 12px; }
            th:first-child, td:first-child { padding-left: 20px; }
            th:last-child, td:last-child { padding-right: 20px; }
            a { padding: 6px 12px; font-size: 13px; }
        }

        @media (max-width: 600px) {
            .container { overflow-x: auto; }
            table { min-width: 540px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>文创产品管理</h2>
    <form th:action="@{/Mindex}" method="post">
        <input  name="keyword" type="text" placeholder="请输入产品名称" th:value="${keyword}">
        <button type="submit">查询</button>
        <a th:href="@{/Mindex}">查看所有</a>
        <a th:href="@{/Madd}">添加文创产品</a></form>
    <table>
        <tr>
            <th>名称</th>
            <th>价格</th>
            <th>新旧程度</th>
            <th>删除</th>
            <th>详情</th>
        </tr>
        <!-- 查询结果为空 -->
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="5">查询结果为空</td>
        </tr>
        <!-- 查询结果不空 -->
        <tr th:unless="${#lists.isEmpty(products)}" th:each="product:${products}">
            <td ><a th:href="@{/Medit(id=${product.id})}" th:text="${product.title}"></a>书签</td>
            <td class="单价" th:text="${product.price}">10</td>
            <td class="库存" th:text="${product.condition}">100</td>
            <td><a class="delete" th:href="@{/Mdel(id=${product.id})}"
                   onclick="return confirm('确定要删除这条记录吗？删除后不可恢复！')" >删除</a></td>
            <td><a th:href="@{/Mdetail(id=${product.id})}">查看详情</a></td>
        </tr>
    </table>
</div>
</body>
</html>
