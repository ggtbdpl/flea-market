<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品详情 - 校园跳蚤市场</title>
    <link rel="stylesheet" th:href="@{/static/css/admin.css}">
    <style>
        .detail-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .image-section {
            flex: 1;
            min-width: 300px;
            max-width: 420px;
        }
        .image-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .image-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
            background: #f5f7fa;
        }
        .image-card .no-img {
            width: 100%;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
            border-radius: 10px;
            color: #999;
            font-size: 14px;
        }
        .info-section {
            flex: 2;
            min-width: 320px;
        }
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .info-header {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-header h2 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }
        .info-row {
            display: flex;
            padding: 14px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
            align-items: center;
        }
        .info-row .label {
            width: 80px;
            color: #888;
            flex-shrink: 0;
        }
        .info-row .value {
            color: #333;
            font-weight: 500;
        }
        .price-current {
            color: #e74c3c;
            font-size: 22px;
            font-weight: bold;
        }
        .price-original {
            color: #bbb;
            text-decoration: line-through;
            margin-left: 10px;
            font-size: 14px;
        }
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid;
        }
        .status-0 {
            color: #f39c12;
            border-color: #f1c40f;
            background: #fef9e7;
        }
        .status-1 {
            color: #27ae60;
            border-color: #2ecc71;
            background: #f2fdf5;
        }
        .status-2 {
            color: #c0392b;
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        .status-3 {
            color: #7f8c8d;
            border-color: #95a5a6;
            background: #f4f6f7;
        }
        .desc-card {
            margin-top: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
            line-height: 1.8;
            color: #555;
            font-size: 14px;
        }
        .desc-card strong {
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 25px;
            padding: 10px 24px;
            background: #f5f5f5;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: #e8e8e8;
        }
        .empty-tip {
            text-align: center;
            padding: 80px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="logo"><h3>校园跳蚤市场</h3><span>后台管理系统</span></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/home}">首页概览</a></li>
                <li><a th:href="@{/admin/product}" class="active">商品管理</a></li>
                <li><a th:href="@{/admin/category}">分类管理</a></li>
                <li><a th:href="@{/admin/user}">用户管理</a></li>
                <li><a th:href="@{/admin/trade}">交易管理</a></li>
                <li><a th:href="@{/admin/announcement}">公告管理</a></li>
                <li><a th:href="@{/admin/message}">留言管理</a></li>
                <li><a th:href="@{/admin/report}">举报管理</a></li>
            </ul>
        </nav>
        <div class="logout"><a th:href="@{/logout}">退出登录</a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar"><span th:text="'欢迎，' + ${admin.username}">欢迎，管理员</span></header>
        <div class="content-body">
            <div class="page-header">
                <h2>商品详情</h2>
            </div>

            <div class="detail-wrapper" th:if="${product != null}">
                <div class="image-section">
                    <div class="image-card">
                        <img th:if="${product.image != null and product.image != ''}"
                             th:src="${product.image.startsWith('/')} ? ${product.image} : '/static/images/' + ${product.image}"
                             th:alt="${product.title}">
                        <div class="no-img" th:if="${product.image == null or product.image == ''}">暂无图片</div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-card">
                        <div class="info-header">
                            <h2 th:text="${product.title}">商品标题</h2>
                        </div>

                        <div class="info-row">
                            <span class="label">价格</span>
                            <span class="value">
                                <span class="price-current" th:text="'¥' + ${product.price}">¥99</span>
                                <span class="price-original" th:if="${product.originalPrice != null}" th:text="'¥' + ${product.originalPrice}">¥199</span>
                            </span>
                        </div>

                        <div class="info-row">
                            <span class="label">成色</span>
                            <span class="value" th:text="${product.condition}">9成新</span>
                        </div>

                        <div class="info-row">
                            <span class="label">标签</span>
                            <span class="value" th:text="${product.tags}">标签</span>
                        </div>

                        <div class="info-row">
                            <span class="label">状态</span>
                            <span class="value">
                                <span th:if="${product.status == 0}" class="status-tag status-0">待审核</span>
                                <span th:if="${product.status == 1}" class="status-tag status-1">上架</span>
                                <span th:if="${product.status == 2}" class="status-tag status-2">下架</span>
                                <span th:if="${product.status == 3}" class="status-tag status-3">已售出</span>
                            </span>
                        </div>

                        <div class="info-row">
                            <span class="label">分类ID</span>
                            <span class="value" th:text="${product.categoryId}">1</span>
                        </div>

                        <div class="info-row">
                            <span class="label">联系人</span>
                            <span class="value" th:text="${product.contact}">微信:test</span>
                        </div>

                        <div class="info-row">
                            <span class="label">发布者</span>
                            <span class="value" th:text="'用户ID: ' + ${product.userId}">1</span>
                        </div>

                        <div class="info-row">
                            <span class="label">创建时间</span>
                            <span class="value" th:text="${product.createTime}">2024-01-01</span>
                        </div>

                        <div class="desc-card" th:if="${product.description != null and product.description != ''}">
                            <strong>商品描述</strong>
                            <span th:text="${product.description}">暂无描述</span>
                        </div>

                        <a th:href="@{/admin/product}" class="btn-back">← 返回列表</a>
                    </div>
                </div>
            </div>

            <div class="empty-tip" th:if="${product == null}">
                <p>商品不存在或已被删除</p>
                <a th:href="@{/admin/product}" class="btn-back">← 返回列表</a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
