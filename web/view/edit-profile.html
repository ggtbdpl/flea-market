<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑资料 - 校园跳蚤市场</title>
    <style>
        :root { --primary:#0a8c7f; --primary-hover:#097a6e; --bg:#f5f7fa; --text:#333; --text-secondary:#666; --border:#eee; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei",sans-serif; }
        body { background:var(--bg); padding-top:56px; }
        header {
            position:fixed; top:0; left:0; width:100%; z-index:1000; background:#fff;
            padding:0 40px; height:56px; display:flex; align-items:center; justify-content:space-between;
            border-bottom:2px solid var(--primary); box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .logo img { height:36px; border-radius:4px; }
        .logo span { color:var(--primary); font-size:20px; font-weight:bold; }
        .nav-back a { color:var(--text-secondary); text-decoration:none; font-size:14px; transition:0.3s; }
        .nav-back a:hover { color:var(--primary); }
        .container { max-width:600px; margin:40px auto; padding:0 20px; }
        .card { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:32px; }
        .card h2 { font-size:20px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
        .form-row { display:flex; align-items:center; margin-bottom:20px; gap:16px; }
        .form-row.avatar-row { align-items:flex-start; }
        .form-label { width:80px; color:var(--text-secondary); font-size:14px; text-align:right; flex-shrink:0; }
        .form-input {
            flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:8px;
            font-size:14px; outline:none; transition:0.3s; max-width:360px;
        }
        .form-input:focus { border-color:var(--primary); }
        .form-input[readonly] { background:#f8f9fa; color:var(--text-secondary); cursor:not-allowed; }
        .avatar-wrap { display:flex; align-items:center; gap:16px; flex:1; }
        .avatar-preview {
            width:80px; height:80px; border-radius:50%; object-fit:cover;
            background:linear-gradient(135deg, var(--primary) 0%, #a8e6cf 100%);
            display:block;
        }
        .avatar-text {
            width:80px; height:80px; border-radius:50%;
            background:linear-gradient(135deg, var(--primary) 0%, #a8e6cf 100%);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:32px; font-weight:bold;
        }
        .file-input { position:absolute; opacity:0; width:0; height:0; }
        .file-btn {
            display:inline-block; padding:8px 20px; background:var(--primary);
            color:#fff; border-radius:6px; font-size:13px; cursor:pointer;
            transition:0.3s; border:none;
        }
        .file-btn:hover { background:var(--primary-hover); }
        .hint { font-size:12px; color:#999; margin-top:6px; }
        .error { color:#e74c3c; font-size:13px; margin-bottom:16px; background:#fff0f0; padding:10px 14px; border-radius:6px; }
        .btn-group { display:flex; gap:12px; margin-top:32px; padding-left:96px; }
        .btn {
            padding:10px 32px; border:none; border-radius:8px; font-size:15px;
            cursor:pointer; transition:0.3s; text-align:center; text-decoration:none;
        }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); }
        .btn-secondary { background:#f5f7fa; color:var(--text); border:1px solid var(--border); }
        .btn-secondary:hover { background:#eee; }
    </style>
</head>
<body>
<header>
    <a th:href="@{/index}" class="logo">
        <img th:src="@{/static/images/logo.png}" alt="logo">
        <span>校园跳蚤市场</span>
    </a>
    <div class="nav-back">
        <a th:href="@{/user/center}">← 返回个人中心</a>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>编辑资料</h2>
        <div class="error" th:if="${msg != null}" th:text="${msg}"></div>
        <form th:action="@{/user/edit}" method="post" enctype="multipart/form-data">

            <div class="form-row avatar-row">
                <div class="form-label">头像</div>
                <div class="avatar-wrap">
                    <img th:if="${user.avatar != null}" th:src="@{'/' + ${user.avatar}}" class="avatar-preview" alt="avatar" onerror="this.style.display='none'">
                    <div th:if="${user.avatar == null}" class="avatar-text" th:text="${user.nickname != null ? #strings.substring(user.nickname,0,1) : '用'}">用</div>
                    <div>
                        <input type="file" id="avatarInput" name="avatar" class="file-input" accept="image/*">
                        <label for="avatarInput" class="file-btn">选择文件</label>
                        <div class="hint">支持 jpg/png/gif，不上传则保持原头像</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" th:value="${user.username}" readonly>
            </div>

            <div class="form-row">
                <label class="form-label">昵称</label>
                <input type="text" name="nickname" class="form-input" th:value="${user.nickname}" required>
            </div>

            <div class="form-row">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-input" th:value="${user.phone}" required>
            </div>

            <div class="form-row">
                <label class="form-label">新密码</label>
                <input type="password" name="password" class="form-input" placeholder="留空则不修改">
            </div>

            <div class="form-row">
                <label class="form-label">确认密码</label>
                <input type="password" name="confirmPassword" class="form-input" placeholder="留空则不修改">
            </div>

            <div class="btn-group">
                <a th:href="@{/user/center}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
